// ========== Импорты ==========
import groovy.json.JsonOutput
import groovy.json.JsonSlurper

// ========== Buildscript для Mixin ==========
buildscript {
  repositories {
    maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
    mavenCentral()
  }
  dependencies {
    classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
  }
}

// ========== Плагины ==========
plugins {
  id 'idea'
  id 'eclipse'
  id 'maven-publish'
  id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
  id 'org.parchmentmc.librarian.forgegradle' version '1.+'
}

apply plugin: 'org.spongepowered.mixin'

// ========== Wrapper ==========
tasks.named('wrapper', Wrapper).configure {
  gradleVersion = '8.14.5'
  distributionType = Wrapper.DistributionType.ALL
}

// ========== Основные свойства ==========
group = mod_group_id
version = mod_version
base { archivesName = mod_id }

jarJar.enable()

// ========== Java ==========
java.toolchain.languageVersion = JavaLanguageVersion.of(17)

// ========== SourceSets ==========
sourceSets {
  main {
    resources {
      srcDirs += 'src/datagen/generated/main'
      exclude '.cache'
    }
  }
  ae {
    java.srcDirs = ['src/ae/java']
    resources.srcDirs = ['src/ae/resources', 'src/datagen/generated/ae']
    compileClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.main.output
  }
  crafting {
    java.srcDirs = ['src/crafting/java']
    resources.srcDirs = ['src/crafting/resources', 'src/datagen/generated/crafting']
    compileClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.main.output
  }
  ore {
    java.srcDirs = ['src/ore/java']
    resources.srcDirs = ['src/ore/resources', 'src/datagen/generated/ore']
    compileClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.main.output
  }
  // Датагены
  datagenMain {
    java.srcDirs = ['src/datagen/main/java']
    resources.srcDirs = ['src/datagen/main/resources']
    compileClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.main.output
  }
  datagenAe {
    java.srcDirs = ['src/datagen/ae/java']
    resources.srcDirs = ['src/datagen/ae/resources']
    compileClasspath += sourceSets.main.output
    compileClasspath += sourceSets.ae.output
    runtimeClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.ae.output
  }
  datagenCrafting {
    java.srcDirs = ['src/datagen/crafting/java']
    resources.srcDirs = ['src/datagen/crafting/resources']
    compileClasspath += sourceSets.main.output
    compileClasspath += sourceSets.crafting.output
    runtimeClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.crafting.output
  }
  datagenOre {
    java.srcDirs = ['src/datagen/ore/java']
    resources.srcDirs = ['src/datagen/ore/resources']
    compileClasspath += sourceSets.main.output
    compileClasspath += sourceSets.ore.output
    runtimeClasspath += sourceSets.main.output
    runtimeClasspath += sourceSets.ore.output
  }
}

// ========== Конфигурации ==========
configurations {
  datagenNonMod
  aeImplementation.extendsFrom(implementation)
  craftingImplementation.extendsFrom(implementation)
  oreImplementation.extendsFrom(implementation)
  datagenMainImplementation.extendsFrom(implementation)
  datagenAeImplementation.extendsFrom(implementation)
  datagenCraftingImplementation.extendsFrom(implementation)
  datagenOreImplementation.extendsFrom(implementation)
  datagenMainImplementation.extendsFrom(datagenNonMod)
  datagenAeImplementation.extendsFrom(datagenNonMod)
  datagenCraftingImplementation.extendsFrom(datagenNonMod)
  datagenOreImplementation.extendsFrom(datagenNonMod)
}

// ========== Mixin ==========
mixin {
  add sourceSets.main, "${mod_id}.refmap.json"
  config "${mod_id}.mixins.json"

  // Если у модулей есть свои миксины, добавьте:
  // add sourceSets.ae, "industrialtech_ae.refmap.json"
  // config "industrialtech_ae.mixins.json"
  // add sourceSets.crafting, "industrialtech_crafting.refmap.json"
  // config "industrialtech_crafting.mixins.json"
  // add sourceSets.ore, "industrialtech_ore.refmap.json"
  // config "industrialtech_ore.mixins.json"
}

// ========== IDEA ==========
idea {
  module {
    for (String excludeDirName in ["run", "runGameTests", "out", "logs", "gradle"]) {
      excludeDirs.add(new File(projectDir, excludeDirName))
    }
  }
}

// ========== Minecraft ==========
minecraft {
  mappings channel: mapping_channel, version: mapping_version

  if (file('src/main/resources/META-INF/accesstransformer.cfg').exists()) {
    accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')
  }

  copyIdeResources = true

  runs {
    configureEach {
      workingDirectory project.file('run')
      property 'forge.logging.markers', 'REGISTRIES'
      property 'forge.logging.console.level', 'debug'
      property 'mixin.env.remapRefMap', 'true'
      property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
      ideaModule "${rootProject.name}.${project.name}.main"

      mods {
        "${mod_id}" {
          source sourceSets.main
        }
        "industrialtech_ae" {
          source sourceSets.ae
        }
        "industrialtech_crafting" {
          source sourceSets.crafting
        }
        "industrialtech_ore" {
          source sourceSets.ore
        }
      }
    }

    client {
      taskName 'Client'
      property 'forge.enabledGameTestNamespaces', "${mod_id},industrialtech_ae,industrialtech_crafting,industrialtech_ore"
    }

    server {
      taskName 'Server'
      property 'forge.enabledGameTestNamespaces', "${mod_id},industrialtech_ae,industrialtech_crafting,industrialtech_ore"
      args '--nogui'
    }

    gameTestServer {
      taskName 'GameTest'
      property 'forge.enabledGameTestNamespaces', "${mod_id},industrialtech_ae,industrialtech_crafting,industrialtech_ore"
    }

    data {
      taskName 'DataGen'
      workingDirectory project.file('run-data')

      // Генерация для основного модуля
      args '--mod', mod_id,
          '--all',
          '--output', file('src/datagen/generated/main'),
          '--existing', file('src/main/resources/'),
          '--existing', file('src/datagen/generated/main/')
      mods.named(mod_id).configure { source(sourceSets.datagenMain) }

      // Генерация для AE
      args '--mod', 'industrialtech_ae',
          '--output', file('src/datagen/generated/ae'),
          '--existing', file('src/ae/resources/'),
          '--existing', file('src/datagen/generated/ae/')
      mods.named("industrialtech_ae").configure { source(sourceSets.datagenAe) }

      // Генерация для Craft
      args '--mod', 'industrialtech_crafting',
          '--output', file('src/datagen/generated/crafting'),
          '--existing', file('src/crafting/resources/'),
          '--existing', file('src/datagen/generated/craft/')
      mods.named("industrialtech_crafting").configure { source(sourceSets.datagenCrafting) }

      // Генерация для Ore
      args '--mod', 'industrialtech_ore',
          '--output', file('src/datagen/generated/ore'),
          '--existing', file('src/ore/resources/'),
          '--existing', file('src/datagen/generated/ore/')
      mods.named("industrialtech_ore").configure { source(sourceSets.datagenOre) }
    }
  }
}

// ========== Репозитории ==========
repositories {
//  flatDir { dir 'libs' }
//  mavenCentral()

  maven {
    url 'https://maven.blakesmods.com'
  }

  maven {
    url "https://cursemaven.com"
    content {
      includeGroup "curse.maven"
    }
  }

  maven {
    name "Modmaven"
    url "https://modmaven.dev/"
    content {
      includeGroup 'appeng'
    }
  }

  maven {
    url "https://api.modrinth.com/maven"
  }
  exclusiveContent {
    forRepository {
      maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
      }
    }
    forRepositories(fg.repository) // Uncomment when using ForgeGradle
    filter {
      includeGroup "maven.modrinth"
    }
  }

}

