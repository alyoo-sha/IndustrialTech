// ========== Настройка processResources для всех задач ==========
tasks.withType(ProcessResources).configureEach {
  def props = [
      minecraft_version         : minecraft_version,
      minecraft_version_range   : minecraft_version_range,
      forge_version             : forge_version,
      forge_version_range       : forge_version_range,
      loader_version_range      : loader_version_range,
      mod_id                    : mod_id,
      mod_name                  : mod_name,
      mod_license               : mod_license,
      mod_version               : mod_version,
      mod_authors               : mod_authors,
      mod_description           : mod_description,
      // 👇 Добавляем переменные для модулей
      mod_id_ae                 : mod_id_ae,
      mod_name_ae               : mod_name_ae,
      mod_id_crafting           : mod_id_crafting,
      mod_name_crafting         : mod_name_crafting,
      mod_id_ore                : mod_id_ore,
      mod_name_ore              : mod_name_ore
  ]
  inputs.properties(props)
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE

  filesMatching(['META-INF/mods.toml', 'pack.mcmeta', '*.mixins.json']) {
    expand(props)
  }

  doLast {
    fileTree(dir: outputs.files.asPath, includes: ['**/*.json', '**/*.mcmeta']).each { File file ->
      try {
        def json = new JsonSlurper().parse(file)
        file.text = JsonOutput.toJson(json)
      } catch (Exception ignored) {}
    }
  }
}

// ========== JAR-задачи ==========
def createModuleJar(SourceSet ss, String title) {
  return tasks.register(ss.getJarTaskName(), Jar) {
    archiveClassifier.set(ss.name)
    from ss.output
    manifest {
      attributes([
          'Specification-Title'   : title,
          'Specification-Vendor'  : mod_authors,
          'Specification-Version' : project.version,
          'Implementation-Title'  : title,
          'Implementation-Version': project.version,
          'Implementation-Vendor' : mod_authors
      ])
    }
  }
}

def aeJar = createModuleJar(sourceSets.ae, 'IndustrialTech AE')
def craftingJar = createModuleJar(sourceSets.crafting, 'IndustrialTech Crafting')
def oreJar = createModuleJar(sourceSets.ore, 'IndustrialTech Ore')

tasks.named('jar', Jar).configure {
  from sourceSets.main.output
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE

  manifest {
    attributes([
        'Specification-Title'   : mod_name,
        'Specification-Vendor'  : mod_authors,
        'Specification-Version' : project.version,
        'Implementation-Title'  : project.name,
        'Implementation-Version': project.version,
        'Implementation-Vendor' : mod_authors,
        'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
    ])
  }
  finalizedBy 'reobfJar'
}

tasks.register('allJar', Jar) {
  dependsOn classes, aeClasses, craftingClasses, oreClasses
  archiveClassifier.set('all')
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
  from sourceSets.main.output
  from sourceSets.ae.output
  from sourceSets.crafting.output
  from sourceSets.ore.output
  from file('src/datagen/generated')

  manifest {
    attributes([
        'Specification-Title'   : 'IndustrialTech All',
        'Specification-Vendor'  : mod_authors,
        'Specification-Version' : project.version,
        'Implementation-Title'  : 'IndustrialTech All',
        'Implementation-Version': project.version,
        'Implementation-Vendor' : mod_authors
    ])
  }
}

tasks.register('sourcesJar', Jar) {
  dependsOn classes
  archiveClassifier.set('sources')
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
  from sourceSets.main.allJava
  from sourceSets.ae.allJava
  from sourceSets.crafting.allJava
  from sourceSets.ore.allJava
  from sourceSets.datagenMain.allJava
  from sourceSets.datagenAe.allJava
  from sourceSets.datagenCrafting.allJava
  from sourceSets.datagenOre.allJava

  manifest {
    attributes([
        'Specification-Title'   : 'IndustrialTech Sources',
        'Specification-Vendor'  : mod_authors,
        'Specification-Version' : project.version,
        'Implementation-Title'  : 'IndustrialTech Sources',
        'Implementation-Version': project.version,
        'Implementation-Vendor' : mod_authors
    ])
  }
}

// ========== Артефакты ==========
artifacts {
  archives jar
  archives aeJar
  archives craftingJar
  archives oreJar
  archives allJar
  archives sourcesJar
}

// ========== Публикация ==========
publishing {
  publications {
    mavenJava(MavenPublication) {
      artifactId base.archivesName.get()
      from components.java
      artifact aeJar
      artifact craftingJar
      artifact oreJar
      artifact allJar
      artifact sourcesJar
    }
  }
  repositories {
    if (System.getenv("local_maven") != null) {
      maven {
        url "file://" + System.getenv("local_maven")
      }
    }
  }
}

// ========== Оптимизация PNG ==========
tasks.register('optimizePng') {
  doLast {
    def pngFiles = fileTree(dir: projectDir, includes: ['**/*.png'], excludes: ['**/build/**', '**/run/**'])
    pngFiles.each { File file ->
      long size = file.length()
      exec {
        executable 'optipng'
        args '-q', '-o7', '-zm1-9', '-strip', 'all', file
        ignoreExitValue = true
      }
      long newSize = file.length()
      if (newSize < size) {
        println "Сжат $file: ${size} -> ${newSize} байт"
      }
    }
  }
}

// ========== Чейнджлог ==========
tasks.register('outputChangelog') {
  doLast {
    file('build/changelog.txt').text = "Список изменений:\n"
  }
}

// ========== Общие настройки компиляции ==========
tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
  options.release = 17
}

clean {
  delete 'src/datagen/generated'
  delete 'run'
  delete 'run-data'
}